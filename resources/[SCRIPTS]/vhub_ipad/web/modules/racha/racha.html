<!-- modules/racha/racha.html — painel COMPLETO do racha embutido no iPad.
     Porte fiel de vhub_racha/web/modules/panel/panel.html.
     Adaptacoes: sem #vhub-bg full-screen, sem botao de fechar (navbar do iPad),
     shell preenche o container (#vhub-app). Markup sem CSS/JS inline.
     Escopado em .mod-racha. -->

<section class="panel-shell" data-el="shell">

    <!-- ============================================================
         HEADER — brand + tabs nav (sem close: navbar do iPad fecha)
         ============================================================ -->
    <header class="panel-header">
        <div class="panel-brand">
            <img class="panel-logo" src="https://cfx-nui-vhub_racha/web/assets/logo.png" alt="vHub"
                 onerror="this.replaceWith(Object.assign(document.createElement('i'),{className:'fa-solid fa-flag-checkered panel-logo-fallback'}))">
            <div class="panel-brand-txt">
                <span class="panel-brand-name">Mirage <strong>Racha</strong></span>
                <span class="panel-brand-tag" data-el="brand-tag">Liga clandestina</span>
            </div>
        </div>

        <nav class="panel-tabs">
            <button class="panel-tab active" data-tab="tracks">
                <i class="fa-solid fa-road"></i> Pistas
            </button>
            <button class="panel-tab" data-tab="lobbies">
                <i class="fa-solid fa-flag"></i> Lobbies
                <span class="panel-tab-badge hidden" data-el="lobby-count">0</span>
            </button>
            <button class="panel-tab" data-tab="ranking">
                <i class="fa-solid fa-ranking-star"></i> Ranking
            </button>
            <button class="panel-tab" data-tab="history">
                <i class="fa-solid fa-clock-rotate-left"></i> Historico
            </button>
            <button class="panel-tab" data-tab="editor">
                <i class="fa-solid fa-pen-ruler"></i> Editor
            </button>
        </nav>
    </header>


    <!-- ============================================================
         BODY — tab panels
         ============================================================ -->
    <main class="panel-body">

        <!-- VIEW: Pistas -->
        <section class="panel-view active" data-view="tracks">
            <div class="panel-toolbar">
                <div class="panel-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input class="vh-input" data-el="tracks-search" type="text"
                           placeholder="Buscar pista, distrito ou tipo...">
                </div>
                <select class="vh-input" data-el="tracks-filter-kind">
                    <option value="">Todos os tipos</option>
                    <option value="sprint">Sprint</option>
                    <option value="circuit">Circuito</option>
                    <option value="drag">Drag</option>
                    <option value="drift">Drift</option>
                    <option value="speedtrap">Radar</option>
                    <option value="timeattack">Contra-relogio</option>
                    <option value="freerun">Free Run</option>
                </select>
                <span class="panel-count"><b data-el="tracks-count">0</b> pistas</span>
            </div>
            <div class="panel-grid" data-el="tracks-grid"></div>
        </section>

        <!-- VIEW: Lobbies -->
        <section class="panel-view" data-view="lobbies">
            <div class="panel-toolbar">
                <span class="panel-count"><b data-el="lobby-count-2">0</b> lobbies abertos</span>
                <button class="vh-btn ghost" data-action="refresh">
                    <i class="fa-solid fa-arrows-rotate"></i> Atualizar
                </button>
            </div>
            <div class="panel-list" data-el="lobbies-list"></div>
        </section>

        <!-- VIEW: Ranking -->
        <section class="panel-view" data-view="ranking">
            <div class="panel-toolbar">
                <select class="vh-input" data-el="ranking-kind">
                    <option value="sprint">Sprint</option>
                    <option value="circuit">Circuito</option>
                    <option value="drift">Drift</option>
                    <option value="speedtrap">Radar</option>
                    <option value="timeattack">Contra-relogio</option>
                </select>
                <select class="vh-input" data-el="ranking-mode">
                    <option value="wins">Vitorias</option>
                    <option value="time">Melhor tempo</option>
                    <option value="drift">Drift</option>
                </select>
                <button class="vh-btn ghost" data-action="refresh-ranking">
                    <i class="fa-solid fa-arrows-rotate"></i> Atualizar
                </button>
            </div>
            <div class="panel-tablewrap">
                <table class="panel-table">
                    <thead>
                        <tr>
                            <th>#</th><th>Piloto</th><th>Vitorias</th><th>Podios</th>
                            <th>DNF</th><th>Melhor</th><th>Drift</th><th>Top</th>
                        </tr>
                    </thead>
                    <tbody data-el="ranking-tbody"></tbody>
                </table>
            </div>
        </section>

        <!-- VIEW: Historico -->
        <section class="panel-view" data-view="history">
            <div class="panel-toolbar">
                <select class="vh-input" data-el="history-kind">
                    <option value="">Todos os tipos</option>
                    <option value="sprint">Sprint</option>
                    <option value="circuit">Circuito</option>
                    <option value="drift">Drift</option>
                </select>
                <button class="vh-btn ghost" data-action="refresh-history">
                    <i class="fa-solid fa-arrows-rotate"></i> Atualizar
                </button>
            </div>
            <div class="panel-tablewrap">
                <table class="panel-table">
                    <thead>
                        <tr>
                            <th>Quando</th><th>Tipo</th><th>Modo</th><th>Pista</th>
                            <th>Pilotos</th><th>Vencedor</th><th>Tempo</th><th>Pote</th><th></th>
                        </tr>
                    </thead>
                    <tbody data-el="history-tbody"></tbody>
                </table>
            </div>
        </section>

        <!-- VIEW: Editor -->
        <section class="panel-view" data-view="editor">
            <div class="panel-editor">
                <div class="panel-editor-phases">
                    <button class="vh-btn" data-action="editor-start">
                        <i class="fa-solid fa-plus"></i> Novo rascunho
                    </button>
                    <button class="vh-btn" data-action="editor-phase-grid">
                        <i class="fa-solid fa-car"></i> Fase 1: Grade
                    </button>
                    <button class="vh-btn" data-action="editor-phase-cps">
                        <i class="fa-solid fa-flag"></i> Fase 2: Checkpoints
                    </button>
                    <button class="vh-btn" data-action="editor-phase-meta">
                        <i class="fa-solid fa-list"></i> Fase 3: Metadados
                    </button>
                </div>

                <div class="panel-editor-form vh-card">
                    <div class="panel-form-row">
                        <label>ID da pista</label>
                        <input class="vh-input" data-el="meta-id" placeholder="ex: minha_pista">
                    </div>
                    <div class="panel-form-row">
                        <label>Nome</label>
                        <input class="vh-input" data-el="meta-label" placeholder="Nome de exibicao">
                    </div>
                    <div class="panel-form-row">
                        <label>Distrito</label>
                        <input class="vh-input" data-el="meta-district" placeholder="Custom">
                    </div>
                    <div class="panel-form-row">
                        <label>Tipo</label>
                        <select class="vh-input" data-el="meta-kind">
                            <option value="sprint">Sprint</option>
                            <option value="circuit">Circuito</option>
                            <option value="drag">Drag</option>
                            <option value="drift">Drift</option>
                            <option value="speedtrap">Radar</option>
                            <option value="timeattack">Contra-relogio</option>
                            <option value="freerun">Free Run</option>
                        </select>
                    </div>
                    <div class="panel-form-row">
                        <label>Voltas</label>
                        <input class="vh-input" data-el="meta-laps" type="number" min="1" max="10" value="1">
                    </div>
                    <div class="panel-form-row">
                        <label>Taxa de entrada</label>
                        <input class="vh-input" data-el="meta-fee" type="number" min="0" value="0">
                    </div>
                    <div class="panel-form-row">
                        <label>Limite (s)</label>
                        <input class="vh-input" data-el="meta-limit" type="number" min="60" value="300">
                    </div>
                    <div class="panel-form-row checks">
                        <label><input type="checkbox" data-el="meta-illegal"> Ilegal</label>
                        <label><input type="checkbox" data-el="meta-police"> Alerta policia</label>
                    </div>
                    <div class="panel-form-actions">
                        <button class="vh-btn danger" data-action="editor-discard">
                            <i class="fa-solid fa-trash"></i> Descartar
                        </button>
                        <button class="vh-btn primary" data-action="editor-save">
                            <i class="fa-solid fa-floppy-disk"></i> Salvar pista
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>


    <!-- ============================================================
         MODAL — criar lobby (overlay dentro do shell)
         ============================================================ -->
    <div class="panel-modal hidden" data-el="modal">
        <div class="panel-modal-backdrop" data-action="modal-close"></div>
        <div class="panel-modal-box vh-panel">
            <header class="panel-modal-head">
                <h2 class="panel-modal-title">Criar lobby</h2>
                <button class="vh-btn ghost" data-action="modal-close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </header>
            <div class="panel-modal-body">
                <div class="panel-modal-track">
                    <span data-el="modal-track">Pista</span>
                    <span class="vh-chip" data-el="modal-kind">Sprint</span>
                </div>
                <div class="panel-form-row">
                    <label>Modo</label>
                    <select class="vh-input" data-el="modal-mode">
                        <option value="rankeada">Rankeada (com premio)</option>
                        <option value="treino">Treino (sem premio)</option>
                    </select>
                </div>
                <div class="panel-form-row">
                    <label>Voltas</label>
                    <input class="vh-input" data-el="modal-laps" type="number" min="1" max="10" value="1">
                </div>
                <div class="panel-form-row">
                    <label>Taxa de entrada</label>
                    <input class="vh-input" data-el="modal-fee" type="number" min="0" value="1000">
                </div>
            </div>
            <footer class="panel-modal-foot">
                <button class="vh-btn ghost" data-action="modal-close">Cancelar</button>
                <button class="vh-btn primary" data-action="modal-create">
                    <i class="fa-solid fa-flag-checkered"></i> Criar e ir a largada
                </button>
            </footer>
        </div>
    </div>


    <!-- Toast stack (dentro do shell) -->
    <div class="panel-toast-stack" data-el="toast-stack"></div>

</section>
