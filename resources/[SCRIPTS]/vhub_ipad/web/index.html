<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vHub iPad</title>

  <link rel="stylesheet" href="shared/reset.css" />
  <link rel="stylesheet" href="shared/tokens.css" />
  <link rel="stylesheet" href="shared/shell.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!--
    #ipad-container (zoom via largura vw)
      ├─ svg #ipad-frame ........ bezel (do protótipo; sem o wallpaper SVG)
      └─ #ipad-screen .......... overlay HTML sobre o retângulo da tela
           ├─ #ipad-wallpaper .. camada de fundo (dono = shell)
           ├─ #ipad-statusbar .. relógio + bateria
           ├─ #vhub-app ........ módulos montam aqui (lazy)
           └─ #ipad-navbar ..... ◀ ⌂ ×
  -->
  <div id="ipad-container">

    <svg viewBox="0 0 1180 820" xmlns="http://www.w3.org/2000/svg" id="ipad-frame">
      <defs>
        <linearGradient id="bezel-gradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#2a2a2c"/>
          <stop offset="50%"  stop-color="#1a1a1c"/>
          <stop offset="100%" stop-color="#0d0d0f"/>
        </linearGradient>
        <linearGradient id="frame-edge" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#4a4a4d"/>
          <stop offset="50%"  stop-color="#2c2c2e"/>
          <stop offset="100%" stop-color="#1c1c1e"/>
        </linearGradient>
      </defs>

      <rect x="4"  y="4"  width="1172" height="812" rx="48" ry="48" fill="url(#frame-edge)"/>
      <rect x="20" y="20" width="1140" height="780" rx="38" ry="38" fill="url(#bezel-gradient)"/>
      <rect x="60" y="60" width="1060" height="700" rx="18" ry="18" fill="#000"/>
      <circle cx="590" cy="40" r="6"   fill="#0a0a0a" stroke="#2a2a2c" stroke-width="1.5"/>
      <circle cx="590" cy="40" r="2.5" fill="#1a3a4a"/>
    </svg>

    <div id="ipad-screen">
      <div id="ipad-wallpaper"></div>

      <div id="ipad-statusbar">
        <span id="ipad-clock">00:00</span>
        <div class="status-icons">
          <span>5G</span>
          <span id="ipad-batt">100%</span>
          <span>&#128267;</span>
        </div>
      </div>

      <div id="vhub-app"></div>

      <nav id="ipad-navbar">
        <button data-nav="back"  title="Voltar">&#8249;</button>
        <button data-nav="home"  title="Início">&#9679;</button>
        <button data-nav="close" title="Fechar">&times;</button>
      </nav>
    </div>

  </div>

  <!-- runtime (ordem obrigatória) -->
  <script src="runtime/bus.js"></script>
  <script src="runtime/store.js"></script>
  <script src="runtime/bridge.js"></script>
  <script src="runtime/sand.js"></script>
  <script src="runtime/core.js"></script>
  <script src="shared/utils.js"></script>

  <!-- módulos builtin (auto-registram via createModule) -->
  <script src="modules/home/home.js"></script>
  <script src="modules/settings/settings.js"></script>
  <script src="modules/store/store.js"></script>
  <script src="modules/relogio/relogio.js"></script>
  <script src="modules/racha/racha.js"></script>

  <!-- controlador do shell (depois dos módulos) -->
  <script src="shared/shell.js"></script>
</body>
</html>
