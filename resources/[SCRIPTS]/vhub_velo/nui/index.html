<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: transparent; user-select: none;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        /* host do HUD (iframe isolado por HUD) */
        #hud-host { position: relative; width: 100vw; height: 100vh; }
        #hud-host.hidden { display: none; }
        #hud-frame { border: none; width: 100%; height: 100%; background: transparent; pointer-events: none; }

        /* galeria /velo (painel com foco — vidro/areia/dourado) */
        #velo-gallery {
            position: fixed; inset: 0; display: none;
            align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.45);
        }
        #velo-gallery.active { display: flex; }

        .vg-panel {
            width: min(560px, 90vw); max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
            border-radius: 16px; color: #d9c19a;
            background: linear-gradient(180deg, rgba(217,193,154,0.12), rgba(12,10,6,0.55));
            border: 1px solid rgba(217,193,154,0.22);
            box-shadow: 0 20px 60px rgba(0,0,0,0.55);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        }
        .vg-hd {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid rgba(217,193,154,0.22);
        }
        .vg-hd h3 { font-size: 15px; letter-spacing: 1px; color: #f3b53a; }
        .vg-close {
            width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
            border: 1px solid rgba(217,193,154,0.22); background: transparent; color: #d9c19a;
        }
        .vg-close:hover { background: rgba(232,81,63,0.18); border-color: #e8513f; color: #fff; }

        .vg-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .vg-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; border-radius: 10px; cursor: pointer;
            border: 1px solid rgba(217,193,154,0.22);
            background: linear-gradient(180deg, rgba(0,0,0,0.28), rgba(0,0,0,0.12));
            transition: border-color .15s ease;
        }
        .vg-item:hover { border-color: #f3b53a; }
        .vg-item.is-active { border-color: #f3b53a; background: rgba(243,181,58,0.12); }
        .vg-item .name { font-weight: 700; }
        .vg-item .tag { font-size: 11px; color: rgba(217,193,154,0.6); font-family: monospace; }
        .vg-empty { opacity: .5; font-size: 13px; padding: 8px 4px; }

        /* personalização (fundo por link + cor de destaque) */
        .vg-custom { padding: 14px 16px; border-top: 1px solid rgba(217,193,154,0.22); display: flex; flex-direction: column; gap: 10px; }
        .vg-custom-row { display: flex; flex-direction: column; gap: 5px; }
        .vg-custom label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(217,193,154,0.7); }
        .vg-custom input[type=url] {
            font-family: system-ui, sans-serif; font-size: 12px; color: #d9c19a;
            background: rgba(0,0,0,0.30); border: 1px solid rgba(217,193,154,0.22);
            border-radius: 8px; padding: 8px 10px; outline: none;
        }
        .vg-custom input[type=url]:focus { border-color: #f3b53a; }
        .vg-custom-inline { display: flex; align-items: flex-end; gap: 10px; }
        .vg-custom-inline > div { display: flex; flex-direction: column; gap: 5px; }
        .vg-custom input[type=color] {
            width: 44px; height: 32px; padding: 2px; cursor: pointer;
            background: rgba(0,0,0,0.30); border: 1px solid rgba(217,193,154,0.22); border-radius: 8px;
        }
        .vg-apply, .vg-clearbg {
            border-radius: 8px; border: 1px solid rgba(217,193,154,0.22);
            padding: 8px 12px; cursor: pointer; font-weight: 700; font-size: 12px; font-family: system-ui, sans-serif;
        }
        .vg-apply { background: rgba(243,181,58,0.18); color: #f3b53a; }
        .vg-apply:hover { background: rgba(243,181,58,0.30); }
        .vg-clearbg { background: transparent; color: rgba(217,193,154,0.8); }
        .vg-clearbg:hover { border-color: #e8513f; color: #fff; }
        .vg-hint { font-size: 10.5px; color: rgba(217,193,154,0.5); line-height: 1.4; }
    </style>
</head>
<body>
    <!-- HUD atual carregado em iframe (isolamento total: CSS não vaza, HUD bugado não quebra o host) -->
    <div id="hud-host" class="hidden">
        <iframe id="hud-frame" src="about:blank"></iframe>
    </div>

    <!-- Galeria /velo (com foco; passa preferência via callback KVP) -->
    <div id="velo-gallery">
        <div class="vg-panel">
            <div class="vg-hd">
                <h3>Velocímetro — escolher HUD</h3>
                <button class="vg-close" data-act="close" title="Fechar (Esc)">✕</button>
            </div>
            <div class="vg-list" id="vg-list"></div>

            <div class="vg-custom">
                <div class="vg-custom-row">
                    <label>Fundo do velocímetro — link de imagem</label>
                    <input type="url" id="vg-bg" placeholder="https://.../fundo.png" autocomplete="off" />
                </div>
                <div class="vg-custom-inline">
                    <div>
                        <label>Cor</label>
                        <input type="color" id="vg-accent" value="#f3b53a" />
                    </div>
                    <button class="vg-apply" data-act="apply">Aplicar</button>
                    <button class="vg-clearbg" data-act="clearbg">Limpar fundo</button>
                </div>
                <p class="vg-hint">PNG/JPG/WEBP/GIF via http(s). O fundo é só seu (salvo no seu jogo).</p>
            </div>
        </div>
    </div>

    <script src="velo-controller.js"></script>
</body>
</html>
