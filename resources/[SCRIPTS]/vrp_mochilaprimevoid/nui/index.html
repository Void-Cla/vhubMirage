<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Mochila Prime</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app hidden">
    <div class="backdrop"></div>
    <div class="frame">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">VOID</span>
          <span class="brand-sub">MOCHILA PRIME</span>
        </div>
        <div class="context" id="context-label">Mochila</div>
        <button class="close" id="btn-close">Fechar</button>
      </header>

      <main class="content">
        <section id="view-mochila" class="view">
          <div class="panel inventory">
            <div class="panel-header">
              <h2>Mochila</h2>
              <div class="weight">
                <span id="mochila-weight">0 / 0</span>
                <div class="weight-bar"><div id="mochila-weight-bar"></div></div>
              </div>
            </div>
            <div id="mochila-list" class="item-grid"></div>
          </div>

          <aside class="panel side">
            <div class="player-card">
              <div class="avatar" id="player-avatar"></div>
              <div class="player-info">
                <div class="player-name" id="player-name">Jogador</div>
                <div class="player-id" id="player-id">ID 0</div>
                <div class="player-meta">
                  <span id="player-job">Job</span>
                  <span id="player-vip">VIP</span>
                </div>
              </div>
              <div class="player-money">
                <div>Carteira: <span id="player-cash">0</span></div>
                <div>Banco: <span id="player-bank">0</span></div>
                <div>Coin: <span id="player-coin">0</span></div>
              </div>
            </div>

            <div class="binds">
              <h3>Binds</h3>
              <div id="binds" class="binds-grid"></div>
            </div>

            <div class="actions">
              <h3>Acoes</h3>
              <div class="action-row">
                <input id="action-qty" type="number" min="1" value="1" />
                <span id="selected-item">Nenhum item</span>
              </div>
              <div class="action-buttons">
                <button data-action="use">Usar</button>
                <button data-action="drop">Dropar</button>
                <button data-action="send">Enviar</button>
                <button data-action="market">Anunciar</button>
              </div>
            </div>
          </aside>
        </section>

        <section id="view-bau" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2 id="bau-title">Bau</h2>
              <div class="weight">
                <span id="bau-weight">0 / 0</span>
                <div class="weight-bar"><div id="bau-weight-bar"></div></div>
              </div>
            </div>
            <div id="bau-list" class="item-grid"></div>
          </div>
          <div class="panel">
            <div class="panel-header">
              <h2>Mochila</h2>
              <div class="weight">
                <span id="bau-mochila-weight">0 / 0</span>
                <div class="weight-bar"><div id="bau-mochila-weight-bar"></div></div>
              </div>
            </div>
            <div id="bau-mochila-list" class="item-grid"></div>
          </div>
        </section>

        <section id="view-market" class="view">
          <div class="panel market-list">
            <div class="panel-header">
              <h2>Marketplace</h2>
              <input id="market-search" type="text" placeholder="Buscar item" />
            </div>
            <div id="market-items" class="market-grid"></div>
            <div class="panel-subtitle">Recentes</div>
            <div id="market-recent" class="market-grid small"></div>
          </div>
          <div class="panel market-sell">
            <div class="panel-header">
              <h2>Anunciar</h2>
              <div class="sell-meta" id="sell-selected">Nenhum item</div>
            </div>
            <div class="sell-form">
              <input id="sell-qty" type="number" min="1" value="1" placeholder="Quantidade" />
              <input id="sell-price" type="number" min="1" value="1" placeholder="Preco" />
              <textarea id="sell-desc" rows="4" placeholder="Descricao"></textarea>
              <button id="sell-submit">Anunciar item</button>
            </div>
            <div class="sell-inventory" id="sell-inventory"></div>
          </div>
        </section>

        <section id="view-loja" class="view">
          <div class="panel lojas-list">
            <div class="panel-header">
              <h2>Lojas proximas</h2>
            </div>
            <div id="lojas-list" class="list"></div>
          </div>
          <div class="panel loja-items">
            <div class="panel-header">
              <h2 id="loja-nome">Selecione uma loja</h2>
              <div class="sell-meta">Saldo: <span id="loja-saldo">0</span></div>
            </div>
            <div id="loja-items" class="item-grid"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3>Quantidade</h3>
      <input id="modal-qty" type="number" min="1" value="1" />
      <div class="modal-actions">
        <button id="modal-cancel">Cancelar</button>
        <button id="modal-ok">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
