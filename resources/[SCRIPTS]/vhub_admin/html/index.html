<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      display: none;
      user-select: none;
    }

    #panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      max-height: 520px;
      background: rgba(8, 10, 16, 0.97);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.75);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-dot  { width: 6px; height: 6px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
    .header h1   { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; color: #64748b; text-transform: uppercase; }
    .close-btn   { cursor: pointer; color: #475569; font-size: 13px; padding: 2px 5px; border-radius: 3px; line-height: 1; }
    .close-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .tab {
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #475569;
      border-bottom: 2px solid transparent;
      transition: color 0.12s;
    }
    .tab.active { color: #e2e8f0; border-color: #3b82f6; }
    .tab:hover:not(.active) { color: #94a3b8; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; min-height: 0; }
    .tab-pane { display: none; padding: 10px 12px; }
    .tab-pane.active { display: block; }

    /* ── Player table ── */
    .player-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .player-table th {
      text-align: left;
      padding: 4px 6px;
      color: #475569;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .player-table td {
      padding: 5px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: middle;
    }
    .player-table td.col-name {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-table tr:hover td { background: rgba(255,255,255,0.025); }
    .empty-msg { color: #475569; font-size: 12px; text-align: center; padding: 28px 0; }

    /* Ping */
    .ping-g { color: #4ade80; }
    .ping-m { color: #facc15; }
    .ping-b { color: #f87171; }

    /* WL badge */
    .wl-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: filter 0.1s;
    }
    .wl-badge:hover { filter: brightness(1.3); }
    .wl-on  { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .wl-off { background: rgba(100,116,139,0.2); color: #64748b; }

    /* Action buttons */
    .btn-row { display: flex; gap: 3px; }
    .btn {
      padding: 2px 7px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
      white-space: nowrap;
      transition: filter 0.1s;
    }
    .btn:hover { filter: brightness(1.35); }
    .btn-tp    { background: rgba(59,130,246,0.2);  color: #60a5fa; }
    .btn-bring { background: rgba(99,102,241,0.2);  color: #a5b4fc; }
    .btn-heal  { background: rgba(34,197,94,0.2);   color: #4ade80; }
    .btn-kick  { background: rgba(245,158,11,0.2);  color: #fbbf24; }
    .btn-ban   { background: rgba(239,68,68,0.2);   color: #f87171; }
    .btn-frz   { background: rgba(14,165,233,0.18); color: #38bdf8; }

    /* ── Ferramentas tab ── */
    .spawn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      align-items: center;
    }
    .car-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .car-input:focus { border-color: rgba(59,130,246,0.5); }
    .car-input::placeholder { color: #334155; }
    .btn-spawn { background: rgba(59,130,246,0.2); color: #60a5fa; padding: 6px 14px; font-size: 12px; }
    .btn-dv    { background: rgba(239,68,68,0.18); color: #f87171;  padding: 6px 12px; font-size: 12px; }

    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
    }
    .tool-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 11px 12px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .tool-card:hover { background: rgba(255,255,255,0.06); }
    .tool-card.active {
      border-color: rgba(59,130,246,0.45);
      background: rgba(59,130,246,0.08);
    }
    .tool-card .t-label { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
    .tool-card .t-desc  { font-size: 10px; color: #475569; line-height: 1.4; }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .footer-info { font-size: 10px; color: #334155; }
    .btn-refresh {
      font-size: 10px; color: #475569; cursor: pointer;
      padding: 2px 7px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.06); background: transparent;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-refresh:hover { color: #94a3b8; }

    ::-webkit-scrollbar       { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  </style>
</head>
<body>
<div id="panel">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-dot"></div>
      <h1>vHub Admin</h1>
    </div>
    <span class="close-btn" onclick="fechar()">&#10005;</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-btn-players" onclick="mudarTab('players')">Jogadores</div>
    <div class="tab"        id="tab-btn-tools"   onclick="mudarTab('tools')">Ferramentas</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Tab: Jogadores -->
    <div id="tab-players" class="tab-pane active">
      <table class="player-table">
        <thead>
          <tr>
            <th style="width:36px">ID</th>
            <th style="width:36px">UID</th>
            <th>Nome</th>
            <th style="width:58px">Ping</th>
            <th style="width:30px">WL</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="player-tbody">
          <tr><td colspan="6" class="empty-msg">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Tab: Ferramentas -->
    <div id="tab-tools" class="tab-pane">

      <!-- Spawn de veículo -->
      <div class="spawn-row">
        <input id="car-input" class="car-input" type="text"
               placeholder="modelo (ex: adder, zentorno, police)"
               onkeydown="if(event.key==='Enter') spawnarCarro()">
        <button class="btn btn-spawn" onclick="spawnarCarro()">Spawnar</button>
        <button class="btn btn-dv"    onclick="tool('delveh')">Del. Veículo</button>
      </div>

      <!-- Grid de ferramentas -->
      <div class="tools-grid">

        <div class="tool-card" id="card-noclip" onclick="toggleTool('noclip')">
          <div class="t-label">Noclip</div>
          <div class="t-desc">Atravessar colisões · WASD + Q/E</div>
        </div>

        <div class="tool-card" id="card-god" onclick="toggleTool('god')">
          <div class="t-label">God Mode</div>
          <div class="t-desc">Invulnerabilidade total</div>
        </div>

        <div class="tool-card" onclick="tool('heal_me')">
          <div class="t-label">Heal (eu)</div>
          <div class="t-desc">Restaurar HP e colete</div>
        </div>

        <div class="tool-card" onclick="tool('cds', {tipo:1})">
          <div class="t-label">Coords x= y=</div>
          <div class="t-desc">Formato legível · imprime no F8</div>
        </div>

        <div class="tool-card" onclick="tool('cds', {tipo:2})">
          <div class="t-label">Coords vector4</div>
          <div class="t-desc">Formato Lua · imprime no F8</div>
        </div>

      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-info" id="footer-info">— jogadores online</span>
    <button class="btn-refresh" onclick="atualizarJogadores()">&#8635; Atualizar</button>
  </div>

</div>

<script>
  var _noclip = false;
  var _god    = false;

  /* ── Navegação de tabs ── */
  function mudarTab(id) {
    ['players','tools'].forEach(function(t) {
      document.getElementById('tab-' + t).classList.toggle('active', t === id);
      document.getElementById('tab-btn-' + t).classList.toggle('active', t === id);
    });
    if (id === 'players') atualizarJogadores();
  }

  /* ── Painel ── */
  function fechar() {
    document.body.style.display = 'none';
    fetch('https://vhub_admin/fechar', { method: 'POST', body: '{}' });
  }

  /* ── Jogadores ── */
  function atualizarJogadores() {
    document.getElementById('player-tbody').innerHTML =
      '<tr><td colspan="6" class="empty-msg">Carregando...</td></tr>';
    fetch('https://vhub_admin/listar_jogadores', { method: 'POST', body: '{}' });
  }

  function pingClass(p) {
    p = parseInt(p) || 0;
    return p < 80 ? 'ping-g' : p < 200 ? 'ping-m' : 'ping-b';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* Ações por jogador */
  function tpJogador(src)    { fetch('https://vhub_admin/tptome',    {method:'POST', body:JSON.stringify({src:src})}); }
  function bringJogador(src) { fetch('https://vhub_admin/bring',     {method:'POST', body:JSON.stringify({src:src})}); }
  function healJogador(src)  { fetch('https://vhub_admin/heal',      {method:'POST', body:JSON.stringify({src:src})}); }
  function freezeJogador(src){ fetch('https://vhub_admin/freeze',    {method:'POST', body:JSON.stringify({src:src})}); }

  function kickJogador(src, nome) {
    var m = prompt('Kick — ' + nome + '\nMotivo (Enter para confirmar):');
    if (m === null) return;
    fetch('https://vhub_admin/kick', {method:'POST', body:JSON.stringify({src:src, motivo:m||'Kicked by admin.'})});
  }

  function banJogador(src, nome) {
    var m = prompt('Ban — ' + nome + '\nMotivo (Enter para confirmar):');
    if (m === null) return;
    fetch('https://vhub_admin/ban',  {method:'POST', body:JSON.stringify({src:src, motivo:m||'Banido.'})});
  }

  function wlJogador(src, wled) {
    var ev = wled ? 'unwhitelist' : 'whitelist';
    fetch('https://vhub_admin/' + ev, {method:'POST', body:JSON.stringify({src:src})});
    /* Atualiza badge na hora */
    var el = document.getElementById('wl-' + src);
    if (el) {
      el.dataset.wled = wled ? '0' : '1';
      el.textContent  = wled ? 'WL' : 'WL✓';
      el.className    = 'wl-badge ' + (wled ? 'wl-off' : 'wl-on');
      el.onclick      = function() { wlJogador(src, !wled); };
    }
  }

  /* ── Ferramentas ── */
  function tool(cb, data) {
    fetch('https://vhub_admin/' + cb, {method:'POST', body:JSON.stringify(data||{})});
  }

  function toggleTool(tipo) {
    if (tipo === 'noclip') {
      _noclip = !_noclip;
      document.getElementById('card-noclip').classList.toggle('active', _noclip);
    } else if (tipo === 'god') {
      _god = !_god;
      document.getElementById('card-god').classList.toggle('active', _god);
    }
    fetch('https://vhub_admin/' + tipo, {method:'POST', body:'{}'});
  }

  function spawnarCarro() {
    var m = document.getElementById('car-input').value.trim();
    if (!m) return;
    fetch('https://vhub_admin/spawncar', {method:'POST', body:JSON.stringify({modelo:m})});
    document.getElementById('car-input').value = '';
  }

  /* ── Mensagens do Lua ── */
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d) return;

    if (d.action === 'abrir') {
      document.body.style.display = 'block';
      _noclip = d.noclip || false;
      _god    = d.god    || false;
      document.getElementById('card-noclip').classList.toggle('active', _noclip);
      document.getElementById('card-god').classList.toggle('active', _god);
      atualizarJogadores();
    }

    if (d.action === 'player_list') {
      var lista = d.lista || [];
      document.getElementById('footer-info').textContent =
        lista.length + ' jogador(es) online';

      if (lista.length === 0) {
        document.getElementById('player-tbody').innerHTML =
          '<tr><td colspan="6" class="empty-msg">Nenhum jogador online.</td></tr>';
        return;
      }

      var html = '';
      lista.forEach(function(p) {
        var nome = esc(p.name || '?');
        var wled = p.whitelisted ? true : false;
        var src  = p.src;

        html +=
          '<tr>' +
          '<td>' + src + '</td>' +
          '<td style="color:#64748b">' + p.uid + '</td>' +
          '<td class="col-name">' + nome + '</td>' +
          '<td class="' + pingClass(p.ping) + '">' + (p.ping||0) + 'ms</td>' +
          '<td>' +
            '<span id="wl-' + src + '" class="wl-badge ' + (wled?'wl-on':'wl-off') + '" ' +
                  'onclick="wlJogador(' + src + ',' + wled + ')">' +
              (wled ? 'WL✓' : 'WL') +
            '</span>' +
          '</td>' +
          '<td>' +
            '<div class="btn-row">' +
              '<button class="btn btn-tp"    onclick="tpJogador('    + src + ')">TP</button>' +
              '<button class="btn btn-bring" onclick="bringJogador(' + src + ')">Bring</button>' +
              '<button class="btn btn-heal"  onclick="healJogador('  + src + ')">Heal</button>' +
              '<button class="btn btn-frz"   onclick="freezeJogador('+ src + ')">Frz</button>' +
              '<button class="btn btn-kick"  onclick="kickJogador('  + src + ',\'' + nome.replace(/'/g,"\\'") + '\')">Kick</button>' +
              '<button class="btn btn-ban"   onclick="banJogador('   + src + ',\'' + nome.replace(/'/g,"\\'") + '\')">Ban</button>' +
            '</div>' +
          '</td>' +
          '</tr>';
      });
      document.getElementById('player-tbody').innerHTML = html;
    }

    if (d.action === 'noclip_sync') {
      _noclip = d.ativo || false;
      document.getElementById('card-noclip').classList.toggle('active', _noclip);
    }

    if (d.action === 'god_sync') {
      _god = d.ativo || false;
      document.getElementById('card-god').classList.toggle('active', _god);
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') fechar();
  });
</script>
</body>
</html>
