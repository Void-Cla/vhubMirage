<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocimetro Void-Hub | v4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="velocimetro-oculto preview">

    <main id="velocimetro" class="velocimetro-container">
        <div class="speedometerShell">

            <!-- =========================================================
                 CAMADA 1: imagens customizadas (logos / fotos)
                 ========================================================= -->
            <div class="custom-bg-container bg-fuel"  id="custom-fuel-bg"></div>
            <div class="custom-bg-container bg-speed" id="custom-speed-bg"></div>
            <div class="custom-bg-container bg-rpm"   id="custom-rpm-bg"></div>

            <!-- =========================================================
                 CAMADA 2: moldura SVG  (viewBox 470 x 235)
                 Mostradores TANGENTES (um encosta no outro):
                   FUEL  centro (72,100)  r=46
                   SPEED centro (210,100) r=92   (tangente: 72+46+92=210)
                   RPM   centro (370,100) r=68   (tangente: 210+92+68=370)
                 ========================================================= -->
            <svg class="velo-bg" viewBox="0 0 470 235" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

                <!-- ================ FUEL (esq, pequeno r=46) ================ -->
                <g id="dial-fuel" transform="translate(72 100)">
                    <circle r="46" fill="#08080c" stroke="#26282e" stroke-width="1.5"/>
                    <circle r="40" fill="none" stroke="#15161a" stroke-width="1"/>
                    <!-- Arco vermelho de combustível baixo (lado do E, à direita) -->
                    <path d="M 24.7 24.7 A 35 35 0 0 1 0 35" fill="none" stroke="#ff2a2a" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
                    <!-- Letras F (esq) / E (dir) -->
                    <text x="-25" y="20" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="800" fill="#c8c9cd">F</text>
                    <text x="25"  y="20" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="800" fill="#ff2a2a">E</text>
                    <!-- Mini ícone de bomba -->
                    <g transform="translate(0 -30)" fill="#5a5c63">
                        <rect x="-4" y="-5" width="6" height="10" rx="1"/>
                        <rect x="-3" y="-4" width="4" height="3.5" fill="#08080c"/>
                    </g>
                </g>

                <!-- ================ KM/H (centro, grande r=92) ================ -->
                <g id="dial-speed" transform="translate(210 100)">
                    <circle r="92" fill="#08080c" stroke="#2a2c34" stroke-width="2"/>
                    <circle r="80" fill="none" stroke="#15161a" stroke-width="1"/>
                </g>

                <!-- ================ RPM (dir, médio r=68) ================ -->
                <g id="dial-rpm" transform="translate(370 100)">
                    <circle r="68" fill="#08080c" stroke="#26282e" stroke-width="2"/>
                    <circle r="58" fill="none" stroke="#15161a" stroke-width="1"/>
                    <!-- Zona vermelha entre os ticks 8 e 10 -->
                    <path d="M 21.5 -56.0 A 60 60 0 0 1 52.0 -30.0"
                          fill="none" stroke="#ff2a2a" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
                </g>

                <!-- ================ TICKS (gerados pelo JS) ================ -->
                <g id="ticks-fuel"></g>
                <g id="ticks-speed"></g>
                <g id="ticks-rpm"></g>

                <!-- Letreiros pequenos -->
                <text x="72"  y="158" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8.5" font-weight="700" fill="#7a7c83" letter-spacing="1.5">FUEL</text>
                <text x="370" y="158" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8.5" font-weight="700" fill="#7a7c83" letter-spacing="1.5">RPM x1000</text>

                <!-- =========================================================
                     STÁTUS: ícones soltos ao redor (sem caixa)
                     ========================================================= -->

                <!-- Turn signal ESQUERDA -->
                <g id="status-turn-left" class="status-icon turn off" transform="translate(14 100)">
                    <path d="M -11 0 L 3 -9 L 3 -3.5 L 11 -3.5 L 11 3.5 L 3 3.5 L 3 9 Z" fill="currentColor"/>
                </g>
                <!-- Turn signal DIREITA -->
                <g id="status-turn-right" class="status-icon turn off" transform="translate(456 100)">
                    <path d="M 11 0 L -3 -9 L -3 -3.5 L -11 -3.5 L -11 3.5 L -3 3.5 L -3 9 Z" fill="currentColor"/>
                </g>

                <!-- LOCK / CINTO / MOTOR — linha compacta centralizada abaixo -->
                <g id="status-lock" class="status-icon lock locked" transform="translate(180 220)">
                    <path class="shackle" d="M -5 -2 v-4 a5 5 0 0 1 10 0 v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <rect x="-7" y="-2" width="14" height="11" rx="1.5" fill="currentColor"/>
                    <circle cx="0" cy="3" r="1.4" fill="#0a0b0f"/>
                </g>
                <g id="status-belt" class="status-icon belt off" transform="translate(210 220)">
                    <circle cx="0" cy="-8" r="3" fill="currentColor"/>
                    <path d="M -5 8 v-4 a5 4 0 0 1 10 0 v4 Z" fill="currentColor"/>
                    <path d="M -5 -3 L 5 8" stroke="#0a0b0f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </g>
                <g id="status-engine" class="status-icon engine good" transform="translate(240 220)">
                    <rect x="-7" y="-4" width="13" height="10" rx="1" fill="currentColor"/>
                    <rect x="-4" y="-7" width="3"  height="3" fill="currentColor"/>
                    <rect x="1"  y="-7" width="3"  height="3" fill="currentColor"/>
                    <rect x="6"  y="-1" width="3"  height="5" fill="currentColor"/>
                    <rect x="-9" y="2"  width="2"  height="3" fill="currentColor"/>
                </g>
            </svg>

            <!-- =========================================================
                 CAMADA 3: ponteiros
                 ========================================================= -->
            <div class="needle fuel-needle"  id="fuel-needle"  aria-hidden="true"></div>
            <div class="needle speed-needle" id="speed-needle" aria-hidden="true"></div>
            <div class="needle rpm-needle"   id="rpm-needle"   aria-hidden="true"></div>

            <div class="pivot pivot-fuel"></div>
            <div class="pivot pivot-speed"></div>
            <div class="pivot pivot-rpm"></div>

            <!-- =========================================================
                 CAMADA 4: overlay digital
                 ========================================================= -->
            <div class="speedometerOverlay">

                <!-- % combustível -->
                <div class="fuelReadout">
                    <span id="vehicle-fuel">100</span><i>%</i>
                </div>

                <!-- Velocidade + KM/H + odômetro (caixinhas de dígito) -->
                <div class="speedReadout">
                    <h1 class="velo">
                        <span class="defaultVelo" id="vehicle-speed-prefix">00</span><span id="vehicle-speed">0</span>
                    </h1>
                    <div class="speedUnit">KM/H</div>
                    <div class="odometer" id="vehicle-odometer" aria-label="Odômetro"></div>
                </div>

                <!-- Marcha -->
                <div class="gearReadout" aria-label="Marcha atual">
                    <strong id="vehicle-gear">N</strong>
                </div>
            </div>
        </div>
    </main>

    <!-- =========================================================
         /velo  Painel de configuração
         ========================================================= -->
    <aside id="velo-config" class="velo-config" aria-hidden="true">
        <div class="config-card">
            <header>
                <div class="title">
                    <span class="dot"></span>
                    <h2>Personalizar Velocímetro</h2>
                </div>
                <button type="button" id="config-close" class="close" aria-label="Fechar">×</button>
            </header>

            <p class="hint">Cole o link direto (<code>.png</code> / <code>.jpg</code>) de qualquer CDN. Deixe vazio para usar a logo padrão.</p>

            <div class="field">
                <label for="input-fuel">Combustível — imagem central</label>
                <input id="input-fuel" type="url" placeholder="https://cdn.exemplo.com/logo-faccao.png" autocomplete="off">
            </div>
            <div class="field">
                <label for="input-speed">KM/H — imagem central</label>
                <input id="input-speed" type="url" placeholder="https://cdn.exemplo.com/foto-perfil.png" autocomplete="off">
            </div>
            <div class="field">
                <label for="input-rpm">RPM — imagem central</label>
                <input id="input-rpm" type="url" placeholder="https://cdn.exemplo.com/logo-rpm.png" autocomplete="off">
            </div>

            <div class="row colors">
                <div class="field">
                    <label for="color-fuel">Cor ponteiro Fuel</label>
                    <input id="color-fuel" type="color" value="#37e0a1">
                </div>
                <div class="field">
                    <label for="color-speed">Cor ponteiro KM/H</label>
                    <input id="color-speed" type="color" value="#ff8c00">
                </div>
                <div class="field">
                    <label for="color-rpm">Cor ponteiro RPM</label>
                    <input id="color-rpm" type="color" value="#ff2a2a">
                </div>
            </div>

            <footer>
                <button type="button" id="config-reset" class="ghost">Restaurar padrão</button>
                <button type="button" id="config-save"  class="primary">Salvar</button>
            </footer>
        </div>
    </aside>

    <!-- =========================================================
         HUD de preview (só no navegador)
         ========================================================= -->
    <div id="preview-hud" class="preview-hud">
        <div class="row">
            <label>KM/H <output id="hud-speed-out">0</output></label>
            <input id="hud-speed" type="range" min="0" max="400" value="0">
        </div>
        <div class="row">
            <label>RPM <output id="hud-rpm-out">0</output>%</label>
            <input id="hud-rpm" type="range" min="0" max="100" value="0">
        </div>
        <div class="row">
            <label>Fuel <output id="hud-fuel-out">100</output>%</label>
            <input id="hud-fuel" type="range" min="0" max="100" value="100">
        </div>
        <div class="row">
            <label>Motor <output id="hud-engine-out">100</output>%</label>
            <input id="hud-engine" type="range" min="0" max="100" value="100">
        </div>
        <div class="row two">
            <div>
                <label>Marcha</label>
                <select id="hud-gear">
                    <option>N</option><option>R</option>
                    <option>1</option><option>2</option><option>3</option>
                    <option>4</option><option>5</option><option>6</option>
                </select>
            </div>
            <div>
                <label>Odômetro</label>
                <input id="hud-odometer" type="number" min="0" max="999999" value="123456" step="100">
            </div>
        </div>
        <div class="row toggles">
            <button type="button" data-toggle="locked" class="tog">🔒 Trancado</button>
            <button type="button" data-toggle="belt"   class="tog">👤 Cinto</button>
        </div>
        <div class="row toggles">
            <button type="button" data-toggle="turn_left"  class="tog">◄ Pisca-Esq</button>
            <button type="button" data-toggle="turn_right" class="tog">Pisca-Dir ►</button>
        </div>
        <button id="hud-auto" type="button">▶ Simular condução</button>
        <p class="tip">Digite <kbd>/velo</kbd> em qualquer lugar para abrir o painel</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
