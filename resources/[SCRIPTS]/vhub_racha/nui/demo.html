<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirage Racha · Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050402; color: #f5ecd8; font-family: 'Inter', sans-serif; overflow: hidden; }

    /* Fundo simulando GTA atrás do HUD */
    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, #4a3a1e 0%, #1c160a 40%, #050402 100%),
        url('assets/bg.png') center/cover no-repeat;
      background-blend-mode: overlay;
    }
    .stage::after {
      content: ''; position: absolute; inset: 0;
      background:
        repeating-linear-gradient(180deg, transparent 0, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px),
        linear-gradient(180deg, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }
    .stage-fake {
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 18% 70%, rgba(243,181,58,0.10), transparent 40%),
        radial-gradient(circle at 82% 30%, rgba(255,154,31,0.10), transparent 40%);
      pointer-events: none;
    }

    iframe {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: 0; background: transparent;
    }

    /* Painel de controle do demo */
    .demo-ctrl {
      position: fixed; top: 14px; left: 14px; z-index: 9999;
      background: rgba(8, 6, 3, 0.92);
      border: 1px solid rgba(243,181,58,0.50);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 260px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      font-size: 11px;
    }
    .demo-ctrl h4 {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: #f3b53a; letter-spacing: 1.6px; text-transform: uppercase;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .demo-ctrl h4::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #f3b53a; box-shadow: 0 0 8px #f3b53a;
    }
    .demo-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .demo-row b {
      flex-basis: 100%;
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      color: #c4ad84; letter-spacing: 1px; text-transform: uppercase;
      margin: 4px 0 2px;
      font-weight: 500;
    }
    .demo-btn {
      background: rgba(243,181,58,0.10);
      border: 1px solid rgba(243,181,58,0.30);
      color: #f5ecd8;
      padding: 5px 9px; border-radius: 6px;
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      font-weight: 600; letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.1s;
    }
    .demo-btn:hover { background: rgba(243,181,58,0.25); border-color: #f3b53a; color: #ffd573; }
    .demo-btn:active { transform: scale(0.96); }
    .demo-btn.primary { background: #f3b53a; color: #0c0a06; border-color: #f3b53a; }
    .demo-btn.primary:hover { background: #ffd573; color: #0c0a06; }
    .demo-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: #c4ad84;
      cursor: pointer; user-select: none;
      padding: 4px 0;
    }
    .demo-toggle input { accent-color: #f3b53a; }
    .demo-hint {
      font-size: 9.5px; color: #8a7a5a;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
      margin-top: 6px; padding-top: 6px;
      border-top: 1px dashed rgba(243,181,58,0.20);
      line-height: 1.5;
    }
    .demo-hint span { color: #f3b53a; }

    .collapsed .demo-body { display: none; }
    .collapse-btn {
      margin-left: auto;
      background: transparent; border: none; color: #f3b53a;
      cursor: pointer; font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="stage"></div>
  <div class="stage-fake"></div>
  <iframe id="nui" src="index.html"></iframe>

  <div class="demo-ctrl" id="ctrl">
    <h4>
      MG7 · DEMO CONTROLLER
      <button class="collapse-btn" id="collapse" title="Recolher">▾</button>
    </h4>

    <div class="demo-body">
      <div class="demo-row">
        <b>Painel /racha</b>
        <button class="demo-btn primary" data-act="open">Abrir</button>
        <button class="demo-btn" data-act="close">Fechar</button>
      </div>

      <div class="demo-row">
        <b>HUD de corrida</b>
        <button class="demo-btn primary" data-act="race-full">Corrida cinemática</button>
        <button class="demo-btn" data-act="hud-show">Show HUD</button>
        <button class="demo-btn" data-act="countdown">Countdown</button>
        <button class="demo-btn" data-act="hud-hide">Hide HUD</button>
      </div>

      <div class="demo-row">
        <b>Eventos in-race</b>
        <button class="demo-btn" data-act="next-cp">Próx CP</button>
        <button class="demo-btn" data-act="near-cp">CP Próximo</button>
        <button class="demo-btn" data-act="lap">Volta+</button>
        <button class="demo-btn" data-act="drift">Drift</button>
        <button class="demo-btn" data-act="flash">Flash</button>
      </div>

      <div class="demo-row">
        <b>Final</b>
        <button class="demo-btn" data-act="finish-1">#1 Win</button>
        <button class="demo-btn" data-act="finish-3">#3</button>
      </div>

      <label class="demo-toggle">
        <input type="checkbox" id="auto-sim" checked />
        Auto-sim velocidade/heading
      </label>

      <div class="demo-hint">
        Iframe envia <span>postMessage</span> simulando o cliente Lua.<br>
        Sem servidor. Sem chamadas reais.
      </div>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('nui');
    function send(action, data) {
      try { iframe.contentWindow.postMessage({ action, data: data || {} }, '*'); }
      catch (e) { console.error(e); }
    }

    // ─── Mock data ─────────────────────────────────────────────────
    const MOCK = {
      catalog: [
        { id: 'sprint_lsia', label: 'LSIA Runway Sprint', district: 'LSIA', kind: 'sprint',
          cps: 8, min_players: 2, max_players: 8, default_fee: 5000, illegal: true, alerts_police: true, laps: 1 },
        { id: 'circuit_vinewood', label: 'Vinewood Circuit', district: 'Vinewood', kind: 'circuit',
          cps: 14, min_players: 3, max_players: 12, default_fee: 8000, illegal: false, laps: 3 },
        { id: 'drift_chiliad', label: 'Mt. Chiliad Drift', district: 'Mt. Chiliad', kind: 'drift',
          cps: 22, min_players: 2, max_players: 6, default_fee: 3500, illegal: true, laps: 1 },
        { id: 'drag_grovestreet', label: 'Grove Drag Strip', district: 'Grove Street', kind: 'drag',
          cps: 2, min_players: 2, max_players: 4, default_fee: 12000, illegal: true, laps: 1 },
        { id: 'speedtrap_freeway', label: 'I-5 Radar Run', district: 'Freeway', kind: 'speedtrap',
          cps: 6, min_players: 1, max_players: 8, default_fee: 1500, illegal: false, laps: 1 },
        { id: 'timeattack_storm', label: 'Storm Drain TA', district: 'LS River', kind: 'timeattack',
          cps: 18, min_players: 1, max_players: 1, default_fee: 0, illegal: false, laps: 1, source: 'custom' },
        { id: 'sprint_palmino', label: 'Palomino Sands', district: 'Palomino', kind: 'sprint',
          cps: 10, min_players: 2, max_players: 8, default_fee: 4000, illegal: true, laps: 1 },
        { id: 'circuit_paleto', label: 'Paleto Bay Loop', district: 'Paleto Bay', kind: 'circuit',
          cps: 12, min_players: 3, max_players: 10, default_fee: 6500, illegal: false, laps: 2 },
      ],
      lobbies: [
        { id: 'a1', track_id: 'sprint_lsia', label: 'LSIA Runway Sprint', kind: 'sprint',
          state: 'lobby', mode: 'rankeada', players: 5, max_players: 8, entry_fee: 5000, confirmed: 0 },
        { id: 'a2', track_id: 'drift_chiliad', label: 'Mt. Chiliad Drift', kind: 'drift',
          state: 'pending', mode: 'rankeada', players: 4, max_players: 6, entry_fee: 3500, confirmed: 2 },
        { id: 'a3', track_id: 'circuit_vinewood', label: 'Vinewood Circuit', kind: 'circuit',
          state: 'lobby', mode: 'treino', players: 2, max_players: 12, entry_fee: 0, confirmed: 0 },
      ],
      ranking: [
        { nick: 'Rico "Mirage" Vega', wins: 24, podiums: 41, dnf: 3, best_time_ms: 87340, total_drift: 142000, top_speed: 312 },
        { nick: 'Selene Cortez',      wins: 19, podiums: 38, dnf: 5, best_time_ms: 88120, total_drift: 121000, top_speed: 298 },
        { nick: 'Khalid Sanders',     wins: 17, podiums: 33, dnf: 4, best_time_ms: 88950, total_drift: 98000,  top_speed: 305 },
        { nick: 'Yuki Tanaka',        wins: 12, podiums: 28, dnf: 7, best_time_ms: 89200, total_drift: 156000, top_speed: 289 },
        { nick: 'Dante Ramos',        wins: 10, podiums: 22, dnf: 6, best_time_ms: 90100, total_drift: 87000,  top_speed: 294 },
        { nick: 'Aisha Brooks',       wins:  8, podiums: 19, dnf: 9, best_time_ms: 91200, total_drift: 65000,  top_speed: 286 },
      ],
      history: [
        { id: 1, started_unix: Math.floor(Date.now()/1000) - 1200, kind: 'sprint', mode: 'rankeada',
          track_id: 'sprint_lsia', players_total: 8, winner_nick: 'Rico Vega', winner_time_ms: 92140, pot_total: 40000 },
        { id: 2, started_unix: Math.floor(Date.now()/1000) - 3600, kind: 'circuit', mode: 'rankeada',
          track_id: 'circuit_vinewood', players_total: 10, winner_nick: 'Selene Cortez', winner_time_ms: 184290, pot_total: 80000 },
        { id: 3, started_unix: Math.floor(Date.now()/1000) - 7200, kind: 'drift', mode: 'treino',
          track_id: 'drift_chiliad', players_total: 4, winner_nick: 'Yuki Tanaka', winner_time_ms: 0, pot_total: 0 },
      ],
      cfg: { brand_name: 'Mirage Racha', brand_tag: 'MG7 · Liga clandestina', max_fee: 100000 },
    };

    // ─── Auto-sim de velocidade e heading ────────────────────────
    let simT = 0, simRunning = false;
    function startSim() {
      if (simRunning) return;
      simRunning = true;
      const loop = () => {
        if (!simRunning) return;
        if (!document.getElementById('auto-sim').checked) {
          setTimeout(loop, 400); return;
        }
        simT += 0.05;
        const kmh = Math.floor(120 + Math.sin(simT * 0.6) * 80 + Math.sin(simT * 2) * 25);
        send('hud_speed', { kmh });

        const heading = Math.sin(simT * 0.4) * 75;
        const dist = Math.max(40, Math.floor(420 + Math.sin(simT * 0.8) * 280));
        send('hud_cp', { i: state.cpI, n: 12, dist, heading_deg: heading, lap: state.lap, lap_total: 3 });

        setTimeout(loop, 120);
      };
      loop();
    }

    const state = { cpI: 1, lap: 1 };

    // Mock leaderboard
    function leader() {
      send('hud_leader', {
        me_id: 'me',
        rows: [
          { id: 'p1', name: 'Rico "Mirage" Vega', gap_ms: 0 },
          { id: 'me', name: 'Você',               gap_ms: 1240 },
          { id: 'p3', name: 'Selene Cortez',      gap_ms: 2890 },
          { id: 'p4', name: 'Yuki Tanaka',        gap_ms: 5320 },
          { id: 'p5', name: 'Khalid Sanders',     gap_ms: 8410 },
          { id: 'p6', name: 'Dante Ramos',        status: 'DNF' },
        ],
      });
    }

    // ─── Botões ───────────────────────────────────────────────────
    document.querySelectorAll('[data-act]').forEach((b) => {
      b.addEventListener('click', () => {
        const a = b.dataset.act;
        switch (a) {
          case 'open':
            send('open', MOCK);
            break;
          case 'close':
            send('close');
            break;
          case 'hud-show':
            send('hud_show', { laps_total: 3, cps_total: 12, players_total: 8, me_id: 'me' });
            leader();
            startSim();
            break;
          case 'countdown':
            send('hud_show', { laps_total: 3, cps_total: 12, players_total: 8, me_id: 'me' });
            leader();
            startSim();
            setTimeout(() => send('hud_countdown', { seconds: 3 }), 200);
            break;
          case 'race-full':
            // sequencia completa
            state.cpI = 1; state.lap = 1;
            send('hud_show', { laps_total: 3, cps_total: 12, players_total: 8, me_id: 'me', best_ms: 89200 });
            leader();
            startSim();
            setTimeout(() => send('hud_countdown', { seconds: 3 }), 400);
            setTimeout(() => send('hud_flash', { text: 'Volta 1' }), 4500);
            break;
          case 'hud-hide':
            simRunning = false;
            send('hud_hide');
            break;
          case 'next-cp':
            state.cpI = (state.cpI % 12) + 1;
            send('hud_cp', { i: state.cpI, n: 12, dist: 300, heading_deg: 30, lap: state.lap, lap_total: 3 });
            break;
          case 'near-cp':
            send('hud_cp', { i: state.cpI, n: 12, dist: 35, heading_deg: 0, lap: state.lap, lap_total: 3 });
            break;
          case 'lap':
            state.lap = Math.min(3, state.lap + 1);
            send('hud_lap', { lap: state.lap, lap_total: 3, best_ms: 89200 });
            break;
          case 'drift':
            send('hud_drift', { score: Math.floor(2000 + Math.random() * 8000) });
            break;
          case 'flash':
            send('hud_flash', { text: 'Setor 2' });
            break;
          case 'finish-1':
            send('hud_finish', { placement: 1, time_ms: 124530, payout: 25000 });
            break;
          case 'finish-3':
            send('hud_finish', { placement: 3, time_ms: 128990, payout: 8000 });
            break;
        }
      });
    });

    // Collapse
    document.getElementById('collapse').addEventListener('click', () => {
      document.getElementById('ctrl').classList.toggle('collapsed');
    });

    // Auto-abrir o painel logo no load
    iframe.addEventListener('load', () => {
      setTimeout(() => send('open', MOCK), 300);
    });
  </script>
</body>
</html>
