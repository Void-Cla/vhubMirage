<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirage Racha</title>

    <!-- Tokens + reset + components (carregam sincronos, prontos antes do JS) -->
    <link rel="stylesheet" href="shared/tokens.css" />
    <link rel="stylesheet" href="shared/reset.css" />
    <link rel="stylesheet" href="shared/components.css" />

    <!-- Fontes Google (canonico vHub + extras tecnicos para racha) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <!-- Ícones = SVG inline local (web/shared/icons.js). Sem CDN/JS remoto. -->
</head>
<body>

    <!-- Canvas de areia global (z-1, pointer-events:none) -->
    <canvas id="vhub-sand"></canvas>

    <!-- Container de montagem dos modulos -->
    <div id="vhub-app"></div>


    <!-- ============================================================
         RUNTIME — ORDEM OBRIGATORIA
         ============================================================
         bus / store / bridge / sand devem existir antes de
         core.js, pois core agrega esses globais em window.vhub.
         shared/utils nao depende de nada. -->

    <script src="runtime/bus.js"></script>
    <script src="runtime/store.js"></script>
    <script src="runtime/bridge.js"></script>
    <script src="runtime/sand.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/icons.js"></script>
    <script src="runtime/core.js"></script>


    <!-- ============================================================
         MODULOS — cada um se auto-registra via vhub.createModule
         ============================================================
         Apenas overlays IN-GAME (sem cursor): HUD na largada/corrida e RACE
         na ready-zone. O PAINEL (pistas/perfil/ranqueado/ranking/editor) vive
         EXCLUSIVAMENTE no iPad (vhub_ipad/web/modules/racha) — nao ha painel
         standalone aqui. O totem de checkpoint e 100% nativo (client/totem.lua). -->

    <script src="modules/hud/hud.js"></script>
    <script src="modules/race/race.js"></script>


    <!-- ============================================================
         BOOTSTRAP — sinaliza ao Lua que a NUI esta pronta
         ============================================================ -->

    <script>
        (async () => {
            // Pre-monta modulos sempre-ativos. INDEPENDENTE por modulo: a
            // falha de um (ex: fetch) NAO impede os outros de montar.
            //   HUD   — overlay in-race  (RACE_PREPARE/START)
            //   RACE  — ready-zone       (LOBBY_PENDING)
            // (o painel completo vive no iPad; o totem e nativo — client/totem.lua)
            for (const name of ['hud', 'race']) {
                try {
                    await vhub.mount(name);
                } catch (err) {
                    console.error('[index] mount ' + name + ' falhou:', err);
                }
            }

            // Hidrata os ícones SVG estáticos (data-icon) dos módulos montados
            try { window.vhubIcons && vhubIcons.hydrate(document); } catch (err) {}

            // Sinaliza Lua: NUI carregou, pode mandar mensagens
            try {
                await vhub.post('nui_ready', { href: location.href });
            } catch (err) {
                // Lua ainda pode nao ter registrado o callback — sem retry agressivo
                console.warn('[index] nui_ready falhou (sera retentado em interacao):', err);
            }
        })();
    </script>

</body>
</html>
