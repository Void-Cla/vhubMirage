<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <div id="bg"></div>

    <!-- ===== LOGIN ===== -->
    <section id="view-login" class="view">
      <div class="panel">
        <div class="brand">
          <span class="brand-mark">vHub</span>
          <span class="brand-sub">Mirage RP</span>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="login" type="button">Entrar</button>
          <button class="tab" data-tab="register" type="button">Criar conta</button>
        </div>

        <form id="form-auth" autocomplete="off">
          <label class="field">
            <span>Usuário</span>
            <input id="in-user" type="text" maxlength="20" spellcheck="false" />
          </label>
          <label class="field">
            <span>Senha</span>
            <input id="in-pass" type="password" maxlength="64" />
          </label>
          <button id="btn-submit" class="btn-primary" type="submit">Entrar</button>
        </form>

        <div id="msg" class="msg"></div>
      </div>
    </section>

    <!-- ===== SELEÇÃO DE PERSONAGEM ===== -->
    <section id="view-charselect" class="view hidden">
      <div class="panel panel-wide">
        <div class="brand">
          <span class="brand-mark">Personagens</span>
          <span class="brand-sub">Escolha quem jogar</span>
        </div>

        <div id="char-list" class="char-list"></div>
        <button id="btn-create" class="btn-ghost" type="button">+ Criar personagem</button>

        <div id="msg2" class="msg"></div>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
