
## ── Driver de banco ──────────────────────────────────────────────────────────
ensure oxmysql

## ── Core vHub (FROZEN v1.0) ──────────────────────────────────────────────────
## Ordem obrigatória pós-freeze:
##   oxmysql → vhub → groups → identity → money → survival
##   → player_state → inventory → garage → admin → gameplay
ensure vhub

## ── Permissões e identidade (sem dependências entre si, mas groups vem antes) ─
ensure vhub_groups        # permissões e grupos por personagem (NUI admin)
ensure vhub_identity      # nome, registro, telefone (chave Pix para transferências)

## ── Economia ─────────────────────────────────────────────────────────────────
ensure vhub_money         # Fleeca Camell — carteira, banco, ATMs, transferências P2P

## ── Vida do personagem ───────────────────────────────────────────────────────
ensure vhub_survival      # fome e sede

## ── Estado do jogador (depende de survival) ──────────────────────────────────
ensure vhub_player_state  # spawn, posição, armas, customização

## ── Inventário (depende de survival e player_state) ─────────────────────────
ensure vhub_inventory     # itens, peso, baús, chaves de veículo

## ── Veículos (depende de inventory e money) ──────────────────────────────────
ensure vhub_conce         # identidade do veículo: chave↔placa↔dono + concessionária + cron 24h
ensure carmod             # pacote unico de carros mod (streaming dinamico via glob)
ensure vhub_ferinha       # marketplace: leilões (+ venda P2P futura) — backend antes da NUI do garage
ensure vhub_garage        # guardar/spawnar veículo (decidido por CHAVE) + NUI do hub de veículos

## ── Administração ────────────────────────────────────────────────────────────
ensure vhub_admin         # painel admin v2 (9 abas NUI)
ensure vhub_legacyfuel
## ── Scripts de gameplay ──────────────────────────────────────────────────────

## vrm_velocimetro foi ABSORVIDO por vhub_vehcontrol (merge 2026-06-03) — nao ensure mais.
ensure vhub_racha        # corridas ilegais, lobby, ranking e historico
ensure vhub_custom
## ── Policial / LSPD ──────────────────────────────────────────────────────────
ensure vhub_lspdtool      # bridge: radar/helicam lê placa → checa BOLO → alerta dispatch

## ── OUTROS ────────────────────────────────────────────────────────────
ensure vhub_loading       # tela de loading personalizada (vhub logo + dicas)
ensure vhub_vehcontrol
ensure vhub_velo
ensure vhub_nitro          # nitro server-authoritative: estado na placa (customization.nitro) — decisao #29
ensure vhub_spawselector
ensure Drift
ensure vhub_ipad

