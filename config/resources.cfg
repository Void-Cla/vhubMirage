
## ── Driver de banco ──────────────────────────────────────────────────────────
ensure oxmysql

## ── FiveM built-ins ──────────────────────────────────────────────────────────
#ensure spawnmanager   # spawn nativo do FiveM — dispara playerSpawned


## ── Core vHub (FROZEN v1.0) ──────────────────────────────────────────────────
## Ordem obrigatória pós-freeze:
##   oxmysql → vhub → groups → identity → money → survival
##   → player_state → inventory → garage → admin → gameplay
ensure vhub

## ── Permissões e identidade (sem dependências entre si, mas groups vem antes) ─
ensure vhub_groups        # permissões e grupos por personagem (NUI admin)
ensure vhub_identity      # nome, registro, telefone (chave Pix para transferências)

## ── Economia ─────────────────────────────────────────────────────────────────
ensure vhub_money         # Fleeca Camell — carteira, banco, ATMs, transferências P2P

## ── Vida do personagem ───────────────────────────────────────────────────────
ensure vhub_survival      # fome e sede

## ── Estado do jogador (depende de survival) ──────────────────────────────────
ensure vhub_player_state  # spawn, posição, armas, customização

## ── Inventário (depende de survival e player_state) ─────────────────────────
ensure vhub_inventory     # itens, peso, baús, chaves de veículo

## ── Veículos (depende de inventory e money) ──────────────────────────────────
ensure vhub_garage        # garage + concessionária + leilão + aluguel + impound + IPVA

## ── Administração ────────────────────────────────────────────────────────────
ensure vhub_admin         # painel admin v2 (9 abas NUI)

## ── Scripts de gameplay ──────────────────────────────────────────────────────
ensure vhub_racha        # corridas ilegais, lobby, ranking e historico
ensure vrm_velocimetro

