## ── Driver de banco ──────────────────────────────────────────────────────────
ensure oxmysql

## ── Core vHub ────────────────────────────────────────────────────────────────
## Ordem obrigatória: oxmysql → vhub → módulos core → player_state → inventory → veículos → admin
ensure vhub

## ── Módulos core (sem dependências entre si) ─────────────────────────────────
ensure vhub_groups        # permissões e grupos
ensure vhub_identity      # nome, registro, telefone
ensure vhub_money         # carteira e banco
ensure vhub_survival      # fome e sede

## ── Estado do jogador (depende de survival) ──────────────────────────────────
ensure vhub_player_state  # spawn, posição, armas, customização

## ── Inventário (depende de survival e player_state) ─────────────────────────
ensure vhub_inventory     # itens, peso, baús, chaves de veículo

## ── Veículos (depende de inventory e money) ──────────────────────────────────
ensure vhub_garage        # garagem — spawna via chave do inventário
ensure vhub_dealership    # concessionária — gera chave e entrega ao inventário

## ── Administração ────────────────────────────────────────────────────────────
ensure vhub_admin         # kick, ban, tp, noclip, give

## ── Scripts de gameplay ──────────────────────────────────────────────────────
ensure vrm_velocimetro

